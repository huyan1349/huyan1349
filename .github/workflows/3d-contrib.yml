name: 3D contrib

on:
  schedule:
    - cron: "10 16 * * *" # 每天北京时间 0:10 更新
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }} # 跟随账号名,改用户名后无需改这里
      - name: Commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git diff --cached --quiet || git commit -m "Update 3D contrib graphs"
          git push
